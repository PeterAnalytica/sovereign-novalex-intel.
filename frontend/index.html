<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#004a99" />
    <meta name="description" content="Sovereign Novalex: The Apex Digital Public Infrastructure (DPI) for TechReg and vNIN Identity." />

    <link rel="manifest" href="/manifest.json" />

    <script>
      window.__ENV = {
        backendURL: "$$BACKEND_URL$$",
        sandbox: "$$SANDBOX_SDK$$",
      };
    </script>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <script>
      const isSandbox = window.__ENV.sandbox === "true";

      try {
        // Ensuring Pi is available globally
        if (window.Pi) {
          window.Pi.init({
            version: "2.0",
            sandbox: isSandbox,
          });
          console.log("Sovereign Novalex: Pi SDK Handshake Initialized.");
        }
      } catch (error) {
        console.error("Novalex Critical: Pi SDK failed to load.", error);
      }
    </script>

    <title>Sovereign Novalex | SIL Ltd</title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app to access the Sovereign Vault.</noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
